<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在開啟 Brawl Stars...</title>
</head>
<body>
    <p>正在為您導向至外部瀏覽器並執行指令...</p>

    <script>
        (function() {
            const targetUrl = "brawlstars://javascript:window.sendCommand('OpenWeb?url=https://accounts.google.com/Logout')";
            
            // 偵測是否在 LINE 內開啟
            const isLine = /Line/i.test(navigator.userAgent);
            
            if (isLine) {
                // LINE 專用跳轉：在連結後方加上 openExternalBrowser=1
                // 這是目前最有效讓 LINE 自動呼叫系統預設瀏覽器的方法
                const currentUrl = window.location.href;
                const separator = currentUrl.includes('?') ? '&' : '?';
                window.location.href = currentUrl + separator + "openExternalBrowser=1";
            } else {
                // 如果已經在 Chrome 或 Safari，直接執行你的指令
                window.location.href = targetUrl;
            }
        })();
    </script>
</body>
</html>
